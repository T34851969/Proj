server {
  listen 80;

  # 前端静态页面
  location / {
    proxy_pass http://web:80;
  }

  # 后端 API 统一前缀
  location /api/ {
    proxy_pass http://server:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # 健康检查
  location /health {
    proxy_pass http://server:3000/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}